app:
  name: attendance-journal
  port: 3000

database:
  host: localhost
  port: 5432
  name: attendance_db
  user: postgres
  password: secret

models:
  - name: students
    many_to_many: [courses]
    fields:
      - name: first_name
        type: varchar(100)
        required: true
        label: "First Name"
      - name: last_name
        type: varchar(100)
        required: true
        label: "Last Name"
      - name: email
        type: varchar(255)
        unique: true
        label: "Email Address"
      - name: enrolled_at
        type: date
        index: true
        label: "Enrolled At"

  - name: courses
    fields:
      - name: name
        type: varchar(200)
        required: true
        label: "Course Name"
      - name: code
        type: varchar(20)
        unique: true
        label: "Course Code"

  - name: subjects
    fields:
      - name: name
        type: varchar(200)
        required: true
      - name: status
        type: enum
        values: [ uno, dos, tres ]

  - name: lessons
    fields:
      - name: date
        type: date
        required: true
      - name: subject_id
        type: int
        references: subjects.id

  - name: attendance
    fields:
      - name: lesson_id
        type: int
        references: lessons.id
      - name: student_id
        type: int
        references: students.id
      - name: present
        type: boolean
        default: false